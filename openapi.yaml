openapi: 3.1.0
info:
  title: Smart Campus — Access Gate Service API
  version: 1.0.0
  description: |
    Hợp đồng API cho cặp Pair 03: Core Business (Consumer) ↔ Access Gate (Provider).
    Core Business truy xuất log quẹt thẻ, trạng thái cổng và thông tin thẻ từ Access Gate
    để phục vụ nghiệp vụ kiểm tra, audit và ra quyết định policy.
  contact:
    name: FIT4110 — Đỗ Tuyến
    email: fit4110@example.edu.vn
servers:
  - url: http://localhost:4010
    description: Prism mock server
  - url: https://api.campus.local
    description: Class network placeholder
tags:
  - name: health
    description: Kiểm tra trạng thái service
  - name: access-logs
    description: Log quẹt thẻ ra/vào cổng
  - name: gates
    description: Trạng thái và thông tin cổng
  - name: cards
    description: Thông tin thẻ RFID
security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái Access Gate service
      description: Endpoint kiểm tra service Access Gate còn hoạt động.
      tags: [health]
      security: []
      responses:
        '200':
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: access-gate
                    time: '2026-05-17T08:00:00Z'

  /access/logs/recent:
    get:
      operationId: getRecentAccessLogs
      summary: Lấy danh sách log quẹt thẻ gần đây
      description: |
        Core Business gọi để lấy danh sách log quẹt thẻ gần đây từ Access Gate.
        Hỗ trợ cursor-based pagination và filter theo gateId, cardId, direction.
      tags: [access-logs]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: gateId
          in: query
          required: false
          description: Lọc theo mã cổng.
          schema:
            type: string
            pattern: '^GATE-[0-9]{2}$'
            example: GATE-01
        - name: cardId
          in: query
          required: false
          description: Lọc theo mã thẻ RFID.
          schema:
            type: string
            pattern: '^RFID-[0-9]{4}-[0-9]{3}$'
            example: RFID-2026-001
        - name: direction
          in: query
          required: false
          description: Lọc theo hướng ra/vào.
          schema:
            type: string
            enum: [IN, OUT]
        - name: fromTime
          in: query
          required: false
          description: Lấy log từ thời điểm này (ISO 8601).
          schema:
            type: string
            format: date-time
        - name: toTime
          in: query
          required: false
          description: Lấy log đến thời điểm này (ISO 8601).
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Danh sách log quẹt thẻ gần đây
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLogPage'
              examples:
                firstPage:
                  value:
                    items:
                      - logId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                        cardId: RFID-2026-001
                        gateId: GATE-01
                        direction: IN
                        timestamp: '2026-05-17T07:55:00Z'
                        status: ALLOWED
                        operatorNote: null
                    nextCursor: null
                    hasMore: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /access/logs/{logId}:
    get:
      operationId: getAccessLogById
      summary: Lấy chi tiết một log quẹt thẻ
      description: Core Business lấy chi tiết một bản ghi log theo UUID để phục vụ audit.
      tags: [access-logs]
      parameters:
        - $ref: '#/components/parameters/LogId'
      responses:
        '200':
          description: Chi tiết log quẹt thẻ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLog'
              examples:
                allowed:
                  value:
                    logId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    cardId: RFID-2026-001
                    gateId: GATE-01
                    direction: IN
                    timestamp: '2026-05-17T07:55:00Z'
                    status: ALLOWED
                    operatorNote: null
                denied:
                  value:
                    logId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babd
                    cardId: RFID-2026-099
                    gateId: GATE-02
                    direction: IN
                    timestamp: '2026-05-17T08:10:00Z'
                    status: DENIED
                    operatorNote: Thẻ hết hạn, từ chối vào cổng B
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /gates/{gateId}/status:
    get:
      operationId: getGateStatus
      summary: Lấy trạng thái hiện tại của cổng
      description: |
        Core Business gọi để kiểm tra trạng thái hoạt động của một cổng cụ thể.
        Trả về state (OPEN/CLOSED/FAULT), lý do nếu FAULT và thời điểm cập nhật.
      tags: [gates]
      parameters:
        - $ref: '#/components/parameters/GateId'
      responses:
        '200':
          description: Trạng thái cổng
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateStatus'
              examples:
                open:
                  value:
                    gateId: GATE-01
                    state: OPEN
                    faultReason: null
                    lastUpdated: '2026-05-17T08:00:00Z'
                fault:
                  value:
                    gateId: GATE-03
                    state: FAULT
                    faultReason: Mất kết nối cảm biến từ 08:05
                    lastUpdated: '2026-05-17T08:05:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /cards/{cardId}:
    get:
      operationId: getCardInfo
      summary: Lấy thông tin thẻ RFID
      description: |
        Core Business gọi để lấy thông tin chi tiết của một thẻ RFID,
        bao gồm chủ thẻ, loại chủ thẻ (Staff hoặc Student) và trạng thái thẻ.
        Trạng thái thẻ dùng oneOf với discriminator.
      tags: [cards]
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '200':
          description: Thông tin thẻ RFID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
              examples:
                activeStaffCard:
                  value:
                    cardId: RFID-2026-001
                    holderName: Nguyễn Văn A
                    holderType: STAFF
                    issuedAt: '2026-01-01T00:00:00Z'
                    expiresAt: '2027-01-01T00:00:00Z'
                    cardStatus:
                      statusCode: ACTIVE
                      activatedAt: '2026-01-01T00:00:00Z'
                suspendedStudentCard:
                  value:
                    cardId: RFID-2026-099
                    holderName: Trần Thị B
                    holderType: STUDENT
                    issuedAt: '2026-02-01T00:00:00Z'
                    expiresAt: null
                    cardStatus:
                      statusCode: SUSPENDED
                      suspendedAt: '2026-05-10T09:00:00Z'
                      suspendReason: Vi phạm nội quy
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    LogId:
      name: logId
      in: path
      required: true
      description: UUID của bản ghi log quẹt thẻ.
      schema:
        type: string
        format: uuid
    GateId:
      name: gateId
      in: path
      required: true
      description: Mã cổng theo định dạng GATE-NN.
      schema:
        type: string
        pattern: '^GATE-[0-9]{2}$'
        example: GATE-01
    CardId:
      name: cardId
      in: path
      required: true
      description: Mã thẻ RFID theo định dạng RFID-YYYY-NNN.
      schema:
        type: string
        pattern: '^RFID-[0-9]{4}-[0-9]{3}$'
        example: RFID-2026-001
    Cursor:
      name: cursor
      in: query
      required: false
      description: Cursor dùng để lấy trang tiếp theo.
      schema:
        type: [string, 'null']
        minLength: 1
        maxLength: 200
    Limit:
      name: limit
      in: query
      required: false
      description: Số item tối đa mỗi trang.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          enum: [ok]
          description: Trạng thái service.
          example: ok
        service:
          type: string
          minLength: 2
          maxLength: 80
          description: Tên service.
          example: access-gate
        time:
          type: string
          format: date-time
          description: Thời điểm kiểm tra.
          example: '2026-05-17T08:00:00Z'

    AccessLog:
      type: object
      additionalProperties: false
      required: [logId, cardId, gateId, direction, timestamp, status]
      properties:
        logId:
          type: string
          format: uuid
          description: UUID của bản ghi log.
          example: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
        cardId:
          type: string
          pattern: '^RFID-[0-9]{4}-[0-9]{3}$'
          description: Mã thẻ RFID đã quẹt.
          example: RFID-2026-001
        gateId:
          type: string
          pattern: '^GATE-[0-9]{2}$'
          description: Mã cổng ghi nhận sự kiện.
          example: GATE-01
        direction:
          type: string
          enum: [IN, OUT]
          description: Hướng vào (IN) hoặc ra (OUT).
          example: IN
        timestamp:
          type: string
          format: date-time
          description: Thời điểm quẹt thẻ.
          example: '2026-05-17T07:55:00Z'
        status:
          type: string
          enum: [ALLOWED, DENIED]
          description: Kết quả kiểm tra truy cập.
          example: ALLOWED
        operatorNote:
          type: [string, 'null']
          maxLength: 300
          description: Ghi chú của nhân viên vận hành, null nếu không có.
          example: null

    AccessLogPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor, hasMore]
      properties:
        items:
          type: array
          minItems: 0
          maxItems: 100
          items:
            $ref: '#/components/schemas/AccessLog'
          description: Danh sách log trong trang hiện tại.
        nextCursor:
          type: [string, 'null']
          description: Cursor trang tiếp theo, null nếu hết dữ liệu.
          example: null
        hasMore:
          type: boolean
          description: Còn dữ liệu ở trang sau hay không.
          example: false

    GateStatus:
      type: object
      additionalProperties: false
      required: [gateId, state, lastUpdated]
      properties:
        gateId:
          type: string
          pattern: '^GATE-[0-9]{2}$'
          description: Mã cổng.
          example: GATE-01
        state:
          type: string
          enum: [OPEN, CLOSED, FAULT]
          description: Trạng thái hoạt động của cổng.
          example: OPEN
        faultReason:
          type: [string, 'null']
          maxLength: 300
          description: Lý do lỗi nếu state là FAULT, null nếu không lỗi.
          example: null
        lastUpdated:
          type: string
          format: date-time
          description: Thời điểm cập nhật trạng thái gần nhất.
          example: '2026-05-17T08:00:00Z'

    Card:
      type: object
      additionalProperties: false
      required: [cardId, holderName, holderType, issuedAt, cardStatus]
      properties:
        cardId:
          type: string
          pattern: '^RFID-[0-9]{4}-[0-9]{3}$'
          description: Mã thẻ RFID.
          example: RFID-2026-001
        holderName:
          type: string
          minLength: 2
          maxLength: 100
          description: Họ tên chủ thẻ.
          example: Nguyễn Văn A
        holderType:
          type: string
          enum: [STAFF, STUDENT]
          description: Loại chủ thẻ — nhân viên hoặc sinh viên.
          example: STAFF
        issuedAt:
          type: string
          format: date-time
          description: Ngày cấp thẻ.
          example: '2026-01-01T00:00:00Z'
        expiresAt:
          type: [string, 'null']
          format: date-time
          description: Ngày hết hạn thẻ, null nếu thẻ không có thời hạn.
          example: '2027-01-01T00:00:00Z'
        cardStatus:
          $ref: '#/components/schemas/CardStatus'

    CardStatus:
      oneOf:
        - $ref: '#/components/schemas/ActiveCardStatus'
        - $ref: '#/components/schemas/SuspendedCardStatus'
        - $ref: '#/components/schemas/BlockedCardStatus'
      discriminator:
        propertyName: statusCode
        mapping:
          ACTIVE: '#/components/schemas/ActiveCardStatus'
          SUSPENDED: '#/components/schemas/SuspendedCardStatus'
          BLOCKED: '#/components/schemas/BlockedCardStatus'
      description: Trạng thái thẻ — ACTIVE, SUSPENDED hoặc BLOCKED.

    ActiveCardStatus:
      type: object
      additionalProperties: false
      required: [statusCode, activatedAt]
      properties:
        statusCode:
          type: string
          const: ACTIVE
          description: Mã trạng thái.
          example: ACTIVE
        activatedAt:
          type: string
          format: date-time
          description: Thời điểm thẻ được kích hoạt.
          example: '2026-01-01T00:00:00Z'

    SuspendedCardStatus:
      type: object
      additionalProperties: false
      required: [statusCode, suspendedAt, suspendReason]
      properties:
        statusCode:
          type: string
          const: SUSPENDED
          description: Mã trạng thái.
          example: SUSPENDED
        suspendedAt:
          type: string
          format: date-time
          description: Thời điểm tạm khóa thẻ.
          example: '2026-05-10T09:00:00Z'
        suspendReason:
          type: string
          minLength: 5
          maxLength: 300
          description: Lý do tạm khóa.
          example: Vi phạm nội quy

    BlockedCardStatus:
      type: object
      additionalProperties: false
      required: [statusCode, blockedAt, blockedReason]
      properties:
        statusCode:
          type: string
          const: BLOCKED
          description: Mã trạng thái.
          example: BLOCKED
        blockedAt:
          type: string
          format: date-time
          description: Thời điểm khóa vĩnh viễn thẻ.
          example: '2026-04-01T00:00:00Z'
        blockedReason:
          type: string
          minLength: 5
          maxLength: 300
          description: Lý do khóa vĩnh viễn.
          example: Báo mất thẻ, phát hiện gian lận

    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          description: URI định danh loại lỗi.
          example: https://campus.local/errors/validation
        title:
          type: string
          minLength: 3
          maxLength: 120
          description: Tiêu đề lỗi ngắn gọn.
          example: Dữ liệu không hợp lệ
        status:
          type: integer
          minimum: 400
          maximum: 599
          description: HTTP status code.
          example: 400
        detail:
          type: [string, 'null']
          maxLength: 500
          description: Mô tả chi tiết lỗi.
          example: Field cardId không đúng định dạng RFID-YYYY-NNN
        instance:
          type: [string, 'null']
          format: uri
          description: URI của request gây lỗi.
          example: 'https://campus.local/cards/BAD-CARD'
        errors:
          type: array
          minItems: 0
          maxItems: 50
          items:
            type: object
            additionalProperties: false
            required: [field, code, message]
            properties:
              field:
                type: string
                minLength: 1
                maxLength: 80
                example: cardId
              code:
                type: string
                minLength: 2
                maxLength: 80
                example: PATTERN_MISMATCH
              message:
                type: string
                minLength: 3
                maxLength: 200
                example: cardId phải có dạng RFID-YYYY-NNN

  responses:
    BadRequest:
      description: Dữ liệu sai định dạng
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/validation
            title: Dữ liệu không hợp lệ
            status: 400
            detail: Tham số direction chỉ chấp nhận IN hoặc OUT
            instance: 'https://campus.local/access/logs/recent'
            errors:
              - field: direction
                code: ENUM_MISMATCH
                message: direction phải là IN hoặc OUT

    Unauthorized:
      description: Thiếu hoặc sai thông tin xác thực
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/unauthorized
            title: Chưa xác thực
            status: 401
            detail: Thiếu Bearer token
            instance: 'https://campus.local/access/logs/recent'
            errors: []

    Forbidden:
      description: Không có quyền thực hiện thao tác
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/forbidden
            title: Không có quyền truy cập
            status: 403
            detail: Token hợp lệ nhưng không có quyền đọc dữ liệu Access Gate
            instance: 'https://campus.local/cards/RFID-2026-001'
            errors: []

    NotFound:
      description: Resource không tồn tại
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/not-found
            title: Không tìm thấy
            status: 404
            detail: Không tìm thấy thẻ RFID-2026-999
            instance: 'https://campus.local/cards/RFID-2026-999'
            errors: []

    InternalServerError:
      description: Lỗi không mong muốn phía server
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/internal
            title: Lỗi server
            status: 500
            detail: Lỗi kết nối database nội bộ
            instance: 'https://campus.local/access/logs/recent'
            errors: []
